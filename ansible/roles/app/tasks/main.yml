- name: Apt update
  apt:
    update_cache: yes

- name: Install app packages
  apt:
    name: "{{ app_packages }}"
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Copy application code to target host
  copy:
    src: "{{ app_local_source_dir }}/"
    dest: "{{ app_source_dir }}"
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Build application Docker image
  community.docker.docker_image:
    name: "{{ app_image_name }}"
    source: build
    build:
      path: "{{ app_source_dir }}"

- name: Run Node.js application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ app_image_name }}"
    state: started
    restart_policy: always
    published_ports:
      - "{{ app_host_port }}:{{ app_container_port }}"
    env:
      REDIS_SENTINELS: "{{ redis_sentinel_endpoints | join(',') }}"
      REDIS_MASTER_NAME: "{{ redis_sentinel_name }}"
      PORT: "{{ app_container_port | string }}"
