ansible_connection: ssh
ansible_user: ubuntu
ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE') }}"
ansible_ssh_common_args: >-
  -o ProxyCommand="ssh -W %h:%p -i {{ lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE') }} -o StrictHostKeyChecking=no ubuntu@{{ lookup('env', 'BASTION_PUBLIC_IP') }}"
  -o StrictHostKeyChecking=no
ansible_python_interpreter: /usr/bin/python3

project_name: carbonfire
